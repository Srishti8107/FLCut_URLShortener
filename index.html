<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLCut</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&family=Lilita+One&display=swap" rel="stylesheet">
    </head>
<body>
    <script src="script.js" defer></script>
        <div class="FLCut">FLCut</div>
        <div class="wrap">
            <div><input type="text" id="long_url" placeholder="Enter your URL" class="longurl" contenteditable="true"></div>
            <div><button id="shortbtn" class="shortenbutton" type="button">Shorten URL</button></div>
            <div><textarea id="short_url" placeholder="Shortened URL" class="shorturl" rows='3'></textarea></div>
        </div>
</body>
</html>

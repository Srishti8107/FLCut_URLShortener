<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLCut: A link shortener</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&family=Lilita+One&display=swap" rel="stylesheet">
    </head>
<body>
    <script src="script.js" defer></script>
    <section class="hero">
        <div class="FLCut">FLCut</div>
        <div class="wrap">
            <div><textarea type="text" id="long_url" placeholder="Enter your URL" class="longurl" contenteditable="true"></textarea></div>
            <div><button id="shortbtn" class="shortenbutton" type="button">Shorten URL</button></div>
            <textarea id="short_url" placeholder="Shortened URL" class="shorturl" rows='3'></textarea>
            <button class="copy" id="copybtn">
                <ion-icon name="clipboard-outline"></ion-icon>
                <span class="copy_label">Copy</span>
            </button>
        </div>
    </section>
    <section class="dashboard" id="dashboard">
        <div class="heading"> Links Generated </div>

    </section>
    <script type="module" src="https://unpkg.com/ionicons@8.0.13/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@8.0.13/dist/ionicons/ionicons.js"></script>
</body>
</html>
